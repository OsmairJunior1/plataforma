<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — VGR Academy</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Minimal Navbar -->
  <nav class="navbar scrolled" style="background:rgba(0,0,0,0.9)">
    <div class="navbar-left">
      <a href="index.html" class="logo" id="siteLogo">VGR<span>ACADEMY</span></a>
    </div>
  </nav>

  <div class="login-page">
    <div class="login-bg">
      <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1600&q=60" alt="BG" />
    </div>

    <div class="login-box">
      <div class="login-logo">VGR<span>ACADEMY</span></div>
      <p class="login-subtitle">Acesse sua conta e continue aprendendo</p>

      <!-- Mensagem de erro/sucesso -->
      <div id="loginMessage" style="display:none;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:0.85rem;font-weight:500"></div>

      <!-- Indicador de rate limit -->
      <div id="attemptsInfo" style="font-size:0.75rem;min-height:18px;margin-bottom:8px"></div>

      <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group">
          <label for="email"><i class="fas fa-envelope" style="margin-right:6px;color:var(--red)"></i>E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email" maxlength="254" />
        </div>
        <div class="form-group">
          <label for="password">
            <i class="fas fa-lock" style="margin-right:6px;color:var(--red)"></i>Senha
            <button type="button" id="togglePass" style="float:right;font-size:0.75rem;color:var(--gray);background:none;border:none;cursor:pointer">
              <i class="fas fa-eye"></i> Mostrar
            </button>
          </label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" maxlength="128" />
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span id="loginBtnText"><i class="fas fa-sign-in-alt" style="margin-right:8px"></i>Entrar</span>
        </button>

        <div class="login-extra">
          <span style="font-size:0.8rem;color:var(--gray)"></span>
          <a href="#">Esqueci minha senha</a>
        </div>
      </form>

      <div class="login-divider"><span>ou acesse com</span></div>

      <div style="display:flex;gap:10px">
        <button class="btn-secondary" style="flex:1;justify-content:center;gap:8px;font-size:0.85rem" onclick="showLoginToast('Login social em breve!')">
          <i class="fab fa-google" style="color:#ea4335"></i> Google
        </button>
        <button class="btn-secondary" style="flex:1;justify-content:center;gap:8px;font-size:0.85rem" onclick="showLoginToast('Login social em breve!')">
          <i class="fab fa-facebook" style="color:#1877f2"></i> Facebook
        </button>
      </div>

      <p class="register-link">
        Não tem conta? <a href="registro.html">Cadastre-se grátis</a>
      </p>
    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>

  <script>
    // ---- Verificar se já está logado ----
    (async function () {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get('redirect');
        const safe = redirect && /^[a-zA-Z0-9\-_./?=&]+\.html/.test(redirect);
        window.location.href = safe ? redirect : 'home.html';
      }
    })();

    // ---- Rate limiting client-side (defesa em profundidade) ----
    const RL_KEY = 'vgr_login_attempts';
    const RL_MAX = 5;
    const RL_MS  = 15 * 60 * 1000;

    function rl_get() {
      try { return JSON.parse(localStorage.getItem(RL_KEY)) || { count: 0, lockedUntil: 0 }; } catch { return { count: 0, lockedUntil: 0 }; }
    }
    function rl_save(d) { localStorage.setItem(RL_KEY, JSON.stringify(d)); }
    function rl_isLocked() {
      const d = rl_get();
      if (d.lockedUntil && Date.now() < d.lockedUntil) return { locked: true, remainingMs: d.lockedUntil - Date.now() };
      return { locked: false };
    }
    function rl_fail() {
      const d = rl_get();
      d.count = (d.count || 0) + 1;
      if (d.count >= RL_MAX) d.lockedUntil = Date.now() + RL_MS;
      rl_save(d);
    }
    function rl_clear() { localStorage.removeItem(RL_KEY); }
    function rl_remaining() { const d = rl_get(); return Math.max(0, RL_MAX - (d.count || 0)); }

    function updateAttemptsDisplay() {
      const lock = rl_isLocked();
      const el = document.getElementById('attemptsInfo');
      const btn = document.getElementById('loginBtn');
      if (lock.locked) {
        const min = Math.ceil(lock.remainingMs / 60000);
        el.textContent = `Bloqueado por ${min} minuto(s) — muitas tentativas.`;
        el.style.color = '#e57373';
        if (btn) btn.disabled = true;
      } else {
        const rem = rl_remaining();
        if (rem < RL_MAX) {
          el.textContent = `${rem} tentativa(s) restante(s).`;
          el.style.color = rem <= 2 ? '#e57373' : '#f5a623';
        } else {
          el.textContent = '';
        }
        if (btn) btn.disabled = false;
      }
    }

    updateAttemptsDisplay();
    setInterval(updateAttemptsDisplay, 30000);

    // ---- Toggle senha ----
    document.getElementById('togglePass')?.addEventListener('click', () => {
      const input = document.getElementById('password');
      const btn = document.getElementById('togglePass');
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = '<i class="fas fa-eye-slash"></i> Ocultar';
      } else {
        input.type = 'password';
        btn.innerHTML = '<i class="fas fa-eye"></i> Mostrar';
      }
    });

    // ---- Mensagens ----
    function showMessage(text, type = 'error') {
      const el = document.getElementById('loginMessage');
      if (!el) return;
      const styles = {
        error:   'background:rgba(229,57,20,0.12);border:1px solid rgba(229,57,20,0.4);color:#e57373',
        success: 'background:rgba(0,200,83,0.12);border:1px solid rgba(0,200,83,0.4);color:#00c853',
        warning: 'background:rgba(245,166,35,0.12);border:1px solid rgba(245,166,35,0.4);color:#f5a623'
      };
      el.style.cssText = `${styles[type]};display:block;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:0.85rem;font-weight:500`;
      el.textContent = text;
    }

    // ---- Login com Supabase Auth ----
    async function handleLogin(e) {
      e.preventDefault();

      const email    = (document.getElementById('email')?.value || '').trim();
      const password = document.getElementById('password')?.value || '';

      if (!email || !password) { showMessage('Preencha e-mail e senha.'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showMessage('E-mail inválido.'); return; }

      const lock = rl_isLocked();
      if (lock.locked) {
        showMessage(`Bloqueado. Tente em ${Math.ceil(lock.remainingMs/60000)} minuto(s).`, 'warning');
        return;
      }

      const btn = document.getElementById('loginBtn');
      const txt = document.getElementById('loginBtnText');
      if (btn) btn.disabled = true;
      if (txt) txt.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px"></i>Verificando...';

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
          rl_fail();
          updateAttemptsDisplay();
          showMessage('E-mail ou senha incorretos.');
          document.getElementById('password').value = '';
          if (btn) btn.disabled = false;
          if (txt) txt.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-right:8px"></i>Entrar';
          return;
        }

        rl_clear();
        if (txt) txt.innerHTML = '<i class="fas fa-check" style="margin-right:8px"></i>Entrando...';

        const params = new URLSearchParams(window.location.search);
        const redirect = params.get('redirect');
        const safe = redirect && /^[a-zA-Z0-9\-_./?=&]+\.html/.test(redirect) ? redirect : 'home.html';
        setTimeout(() => { window.location.href = safe; }, 600);

      } catch (err) {
        showMessage('Erro inesperado. Tente novamente.');
        if (btn) btn.disabled = false;
        if (txt) txt.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-right:8px"></i>Entrar';
      }
    }

    function showLoginToast(msg) {
      let c = document.querySelector('.toast-container');
      if (!c) { c = document.createElement('div'); c.className = 'toast-container'; document.body.appendChild(c); }
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => t.remove(), 3200);
    }
  </script>
</body>
</html>
